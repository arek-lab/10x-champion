name: AI Reviewer
description: Runs the code-reviewer agent on a pull-request diff and returns a JSON verdict.

inputs:
  api-key:
    description: API key for the reviewer model (mapped to OPENROUTER_API_KEY).
    required: true
  pr-title:
    description: Pull request title.
    required: false
    default: ""
  pr-body:
    description: Pull request body.
    required: false
    default: ""
  diff:
    description: Unified diff to review.
    required: false
    default: ""

outputs:
  verdict:
    description: The full JSON review object emitted by the agent (read `verdict` and `score` from it).
    value: ${{ steps.review.outputs.verdict }}

runs:
  using: composite
  steps:
    - id: review
      shell: bash
      env:
        OPENROUTER_API_KEY: ${{ inputs.api-key }}
        PR_TITLE: ${{ inputs.pr-title }}
        PR_BODY: ${{ inputs.pr-body }}
        PR_DIFF: ${{ inputs.diff }}
      run: bash "${{ github.action_path }}/run.sh"
